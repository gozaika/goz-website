          <rect x="11.75" y="40" width="56.5" height="10" fill="black" stroke="none" />
        </g>
        <!-- M -->
        <g transform="translate(170, 30)">
          <path d="M 10 75 Q 10 5 25 5 Q 40 5 40 75 Q 40 5 55 5 Q 70 5 70 75" />
        </g>
      </g>
    </mask>
  </defs>


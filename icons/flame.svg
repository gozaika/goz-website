        <!-- B -->
        <g transform="translate(10, 25)">
          <path d="M 10 5 Q 70 5 70 25 Q 70 40 10 40 Q 70 40 70 55 Q 70 75 10 75" />
        </g>
        <!-- A -->
        <g transform="translate(88, 35)">
